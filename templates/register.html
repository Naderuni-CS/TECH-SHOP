{% extends "base.html" %}

{% block title %}Register - TechShop ERP{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 2rem;">
    <h1 style="margin-bottom: 1.5rem;">Create Account</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2.5rem;">Join the elite tech community today.</p>
    
    <form action="/register" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-input" placeholder="Choose a unique username" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" name="email" id="email" class="form-input" placeholder="name@company.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">
            Create Account <i class="fas fa-user-plus"></i>
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}
