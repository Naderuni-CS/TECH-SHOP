{% extends "base.html" %}

{% block title %}Login - TechShop ERP{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 4rem;">
    <h1 style="margin-bottom: 1.5rem;">Welcome Back</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2.5rem;">Sign in to access your dashboard and products.</p>
    
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-input" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">
            Login <i class="fas fa-sign-in-alt"></i>
        </button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: var(--text-muted);">
        Don't have an account? <a href="/register" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Register here</a>
    </p>
</div>
{% endblock %}
