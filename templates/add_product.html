{% extends "base.html" %}

{% block title %}Add Product - Admin Panel{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <a href="/admin" class="btn btn-outline" style="margin-bottom: 2rem;">
        <i class="fas fa-arrow-left"></i> Back to Admin
    </a>
    
    <h1>Add New Product 📦</h1>

    <div class="form-container" style="max-width: 100%;">
        <form action="/add-product" method="POST" enctype="multipart/form-data" style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <div class="left-col">
                <div class="form-group">
                    <label for="name">Product Name</label>
                    <input type="text" name="name" id="name" class="form-input" placeholder="e.g. Dell XPS 15" required>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select name="category" id="category" class="form-input" required>
                        <option value="Laptops">Laptops</option>
                        <option value="Desktop PCs">Desktop PCs</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Monitors">Monitors</option>
                        <option value="Networking">Networking</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="price">Price (EGP)</label>
                    <input type="number" step="0.01" name="price" id="price" class="form-input" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="quantity">Initial Stock</label>
                    <input type="number" name="quantity" id="quantity" class="form-input" value="0" required>
                </div>
            </div>

            <div class="right-col">
                <div class="form-group">
                    <label for="image">Product Image</label>
                    <input type="file" name="image" id="image" class="form-input" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="description">Full Description</label>
                    <textarea name="description" id="description" class="form-input" rows="8" placeholder="Technical specifications and details..."></textarea>
                </div>
            </div>

            <div style="grid-column: span 2; margin-top: 1rem;">
                <button type="submit" class="btn btn-primary btn-block" style="padding: 1rem;">
                    <i class="fas fa-plus-circle"></i> Save Product to Inventory
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
